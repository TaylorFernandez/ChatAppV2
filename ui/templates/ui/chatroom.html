{% extends "shared/base.html" %}
{% block content %}

<div class="d-flex flex-column h-100">
    <div class="border-bottom px-3 py-2 d-flex align-items-center justify-content-between bg-light">
        <h5 class="mb-0">{{ room.channel_name }}</h5>
        <span id="status" class="badge bg-danger">Disconnected</span>
    </div>

    <div id="chat-messages" class="flex-grow-1 overflow-auto p-3">
    </div>

    <div id="chat-input" class="border-top p-3" style="display: none;">
        <div class="input-group">
            <input type="text" id="message_field" class="form-control" placeholder="Type a message...">
            <button id="send" class="btn btn-primary">
                <i class="bi bi-send-fill"></i> Send
            </button>
        </div>
    </div>
</div>

<!-- Password modal for private rooms -->
<div class="modal fade" id="passwordModal" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1" aria-labelledby="passwordModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="passwordModalLabel">Room Password Required</h5>
            </div>
            <div class="modal-body">
                <p>This room is private. Enter the password to join.</p>
                <div id="passwordError" class="alert alert-danger d-none">Incorrect password. Try again.</div>
                <div class="input-group">
                    <input type="password" class="form-control" id="roomPasswordInput" placeholder="Enter password...">
                    <button class="btn btn-outline-secondary" type="button" id="togglePasswordVisibility">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
            </div>
            <div class="modal-footer">
                <a href="/rooms/" class="btn btn-secondary">Leave</a>
                <button type="button" class="btn btn-primary" id="submitPassword">Submit</button>
            </div>
        </div>
    </div>
</div>

<script>
    var roomName = "{{ room.channel_name }}";
    var roomIsPrivate = {{ room.is_private|yesno:"true,false" }};
    var socket = new WebSocket("ws://localhost:8000/chat/room/", [roomName]);
    var send = document.getElementById("send");
    var messageField = document.getElementById("message_field");
    var chatMessages = document.getElementById("chat-messages");
    var chatInput = document.getElementById("chat-input");
    var passwordModal = null;

    // Message type constants matching the server
    var MSG_AUTHORIZATION_REQUEST = "0";
    var MSG_AUTHORIZATION_ATTEMPT = "1";
    var MSG_AUTHORIZATION_SUCCESS = "2";
    var MSG_MESSAGE = "3";

    function appendMessage(text, align) {
        var wrapper = document.createElement("div");
        wrapper.className = "d-flex mb-2 " + (align === "end" ? "justify-content-end" : "justify-content-start");

        var bubble = document.createElement("div");
        bubble.className = "px-3 py-2 rounded-3 " + (align === "end" ? "bg-primary text-white" : "bg-light border");
        bubble.style.maxWidth = "75%";
        bubble.textContent = text;

        wrapper.appendChild(bubble);
        chatMessages.appendChild(wrapper);
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function enableChat() {
        chatInput.style.display = "block";
        messageField.focus();
    }

    socket.addEventListener("open", function () {
        var statusSpan = document.getElementById("status");
        statusSpan.className = "badge bg-success";
        statusSpan.textContent = "Connected";
    });

    socket.addEventListener("message", function (event) {
        var data = JSON.parse(event.data);

        if (data.msg_type === MSG_AUTHORIZATION_REQUEST) {
            // Server is asking for a password
            passwordModal = new bootstrap.Modal(document.getElementById("passwordModal"));
            passwordModal.show();
        } else if (data.msg_type === MSG_AUTHORIZATION_SUCCESS) {
            // Password accepted
            if (passwordModal) {
                passwordModal.hide();
            }
            enableChat();
        } else if (data.message) {
            appendMessage(data.message, "start");
        }
    });

    socket.addEventListener("close", function () {
        var statusSpan = document.getElementById("status");
        statusSpan.className = "badge bg-danger";
        statusSpan.textContent = "Disconnected";
    });

    socket.addEventListener("error", function () {
        var statusSpan = document.getElementById("status");
        statusSpan.className = "badge bg-danger";
        statusSpan.textContent = "Disconnected";
    });

    // If the room is public, the server won't send an auth request, so enable chat on open
    if (!roomIsPrivate) {
        socket.addEventListener("open", function () {
            enableChat();
        });
    }

    // Send message
    send.addEventListener("click", function () {
        var message = messageField.value.trim();
        if (!message) return;
        messageField.value = "";
        socket.send(JSON.stringify({ msg_type: MSG_MESSAGE, message: message }));
        appendMessage(message, "end");
    });

    messageField.addEventListener("keydown", function (event) {
        if (event.key === "Enter") {
            send.click();
        }
    });

    // Password submission
    document.getElementById("submitPassword").addEventListener("click", function () {
        var password = document.getElementById("roomPasswordInput").value;
        document.getElementById("passwordError").classList.add("d-none");
        socket.send(JSON.stringify({ msg_type: MSG_AUTHORIZATION_ATTEMPT, password: password }));

        // If the server sends another AUTHORIZATION_REQUEST, it means the password was wrong
        // We handle that in the message listener by showing the modal again with an error
        socket.addEventListener("message", function authCheck(event) {
            var data = JSON.parse(event.data);
            if (data.msg_type === MSG_AUTHORIZATION_REQUEST) {
                document.getElementById("passwordError").classList.remove("d-none");
                document.getElementById("roomPasswordInput").value = "";
                document.getElementById("roomPasswordInput").focus();
            }
            socket.removeEventListener("message", authCheck);
        });
    });

    document.getElementById("roomPasswordInput").addEventListener("keydown", function (event) {
        if (event.key === "Enter") {
            document.getElementById("submitPassword").click();
        }
    });

    // Toggle password visibility
    document.getElementById("togglePasswordVisibility").addEventListener("click", function () {
        var input = document.getElementById("roomPasswordInput");
        var isPassword = input.type === "password";
        input.type = isPassword ? "text" : "password";
        this.innerHTML = isPassword ? '<i class="bi bi-eye-slash"></i>' : '<i class="bi bi-eye"></i>';
    });
</script>

{% endblock %}
