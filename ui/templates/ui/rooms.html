{% extends "shared/base.html" %}
{% block content %}

<div class="d-flex flex-column h-100">
    <div class="border-bottom px-3 py-2 d-flex align-items-center justify-content-between bg-light">
        <h5 class="mb-0">Chat Rooms</h5>
        <span id="status" class="badge bg-danger">Disconnected</span>
    </div>
    <div>
        <table class="table table-hover mb-0">
            <thead>
                <th>Name</th>
                <th>Connected Users</th>
                <th>Status</th>
                <th></th>
            </thead>
            <tbody>
                {% for room in rooms %}
                <tr>
                    <td>{{ room.channel_name }}</td>
                    <td>{{ room.num_connections }}</td>
                    <td>
                        {% if room.is_private %}
                            <span class="badge bg-warning text-dark"><i class="bi bi-lock-fill me-1"></i>Private</span>
                        {% else %}
                            <span class="badge bg-success"><i class="bi bi-unlock-fill me-1"></i>Public</span>
                        {% endif %}
                    </td>
                    <td>
                        <a href="/rooms/{{ room.id }}/" class="btn btn-sm btn-outline-primary">
                            <i class="bi bi-box-arrow-in-right me-1"></i>Join
                        </a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
    <div class="mt-auto d-flex justify-content-center p-3">
        <button class="btn btn-primary" style="width: 90%;" data-bs-toggle="modal" data-bs-target="#createRoomModal">
            Create a new room
        </button>
    </div>
</div>

<div class="modal fade" id="createRoomModal" tabindex="-1" aria-labelledby="createRoomModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="createRoomModalLabel">Create a New Room</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="createRoomForm">
                    <div class="mb-3">
                        <label for="roomName" class="form-label">Room Name</label>
                        <input type="text" class="form-control" id="roomName" required>
                    </div>
                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="isPrivate">
                        <label class="form-check-label" for="isPrivate">Private Room</label>
                    </div>
                    <div class="mb-3">
                        <label for="roomPassword" class="form-label">Password</label>
                        <div class="input-group">
                            <input type="password" class="form-control" id="roomPassword" disabled>
                            <button class="btn btn-outline-secondary" type="button" id="togglePassword" disabled>
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" id="submitCreateRoom">Create Room</button>
            </div>
        </div>
    </div>
</div>

<script>
    var isPrivateCheckbox = document.getElementById("isPrivate");
    var roomPassword = document.getElementById("roomPassword");
    var togglePassword = document.getElementById("togglePassword");

    isPrivateCheckbox.addEventListener("change", function () {
        roomPassword.disabled = !this.checked;
        togglePassword.disabled = !this.checked;
        if (!this.checked) {
            roomPassword.value = "";
            roomPassword.type = "password";
            togglePassword.innerHTML = '<i class="bi bi-eye"></i>';
        }
    });

    togglePassword.addEventListener("click", function () {
        var isPassword = roomPassword.type === "password";
        roomPassword.type = isPassword ? "text" : "password";
        this.innerHTML = isPassword ? '<i class="bi bi-eye-slash"></i>' : '<i class="bi bi-eye"></i>';
    });

    document.getElementById("submitCreateRoom").addEventListener("click", function () {
        var name = document.getElementById("roomName").value.trim();
        if (!name) return;

        var isPrivate = document.getElementById("isPrivate").checked;
        var password = document.getElementById("roomPassword").value;

        var body = {
            channel_name: name,
            room_type: isPrivate ? "PR" : "PU",
        };
        if (isPrivate && password) {
            body.password = password;
        }

        fetch("/api/rooms/", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
            },
            body: JSON.stringify(body),
        })
        .then(function (response) {
            if (!response.ok) throw new Error("Failed to create room");
            return response.json();
        })
        .then(function (data) {
            window.location.href = "/rooms/" + data.id + "/";
        })
        .catch(function (err) {
            alert("Error creating room: " + err.message);
        });
    });
</script>
