{% load static %}
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Global Chat</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
        <link rel="stylesheet" href="{% static 'css/global.css' %}">
    </head>
    <body>
        <div class="d-flex vh-100">
            <nav id="sidebar" class="d-flex flex-column flex-shrink-0 p-3 bg-dark text-white" style="width: 250px;">
                Chat App
                <hr>
                <ul class="nav nav-pills flex-column">
                    <li class="nav-item">
                        <a href="/" class="nav-link text-white {% if request.path == '/' %}active{% endif %}">
                            <i class="bi bi-globe me-2"></i>
                            Global Chat
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="/rooms/" class="nav-link text-white {% if '/rooms' in request.path %}active{% endif %}">
                            <i class="bi bi-globe me-2"></i>
                            Chat Rooms
                        </a>
                    </li>
                </ul>
            </nav>

            <main class="flex-grow-1 d-flex flex-column overflow-hidden">
                {% block content %}
                {% endblock %}
            </main>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
